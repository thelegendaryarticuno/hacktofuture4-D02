name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - staging
      - pre-prod
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set environment variables
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "PORT=5001" >> $GITHUB_ENV
            echo "CONTAINER_NAME=staging-app" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/pre-prod" ]]; then
            echo "PORT=5002" >> $GITHUB_ENV
            echo "CONTAINER_NAME=preprod-app" >> $GITHUB_ENV
          else
            echo "PORT=5000" >> $GITHUB_ENV
            echo "CONTAINER_NAME=prod-app" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: docker build -t flask-app-${ENV} .

      - name: Stop existing container
        run: |
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true

      - name: Run new container
        run: |
          docker run -d -p $PORT:5000 --name $CONTAINER_NAME flask-app